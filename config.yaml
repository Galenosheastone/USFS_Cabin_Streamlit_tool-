# Date range to check for availability
search:
  start_date: "2026-04-07"  # YYYY-MM-DD
  end_date: "2026-10-30"
  # Only alert on stays of at least N consecutive nights (1 = any single night)
  min_nights: 1

# Email notification settings (Gmail SMTP)
email:
  enabled: true
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  sender_email: "galenoshea@gmail.com"
  # Use a Gmail App Password, NOT your real Gmail password.
  # See setup_gmail.md for instructions.
  sender_password: "ghvk ajxt kvmy ktpj"
  recipients:
    - "galenoshea@gmail.com"
    # - "another.person@email.com"

# How to handle repeat alerts
notifications:
  # "new_only" = only alert on availability not seen in the previous run
  # "always"   = alert every time availability is found (noisier)
  mode: "new_only"
  # Path to state file for deduplication (relative to this config file)
  state_file: "state.json"
